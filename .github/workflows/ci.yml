name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Parse YAML
        run: |
          ruby -e 'require "yaml"; %w[repository.yaml ha-codex-terminal/config.yaml ha-codex-terminal/translations/en.yaml .github/workflows/ci.yml].each { |f| YAML.load_file(f) }'

      - name: Check shell scripts
        run: |
          bash -n ha-codex-terminal/run.sh ha-codex-terminal/rootfs/usr/local/bin/codex-entry ha-codex-terminal/rootfs/usr/local/bin/start-codex-session ha-codex-terminal/rootfs/etc/s6-overlay/scripts/codex-init
          sh -n \
            ha-codex-terminal/rootfs/etc/profile.d/codex-alias.sh \
            ha-codex-terminal/rootfs/etc/profile.d/ha-cli-aliases.sh \
            ha-codex-terminal/rootfs/etc/profile.d/supervisor-token.sh \
            ha-codex-terminal/rootfs/etc/profile.d/tool-cache-env.sh \
            ha-codex-terminal/rootfs/usr/local/bin/ha-api \
            ha-codex-terminal/rootfs/usr/local/bin/ha-pip \
            ha-codex-terminal/rootfs/usr/local/bin/ha-python \
            ha-codex-terminal/rootfs/usr/local/bin/ha-recorder-schema \
            ha-codex-terminal/rootfs/usr/local/bin/ha-sqlite-ro \
            ha-codex-terminal/rootfs/usr/local/bin/hass \
            ha-codex-terminal/rootfs/usr/local/bin/supervisor-api \
            ha-codex-terminal/rootfs/usr/local/bin/tmux-osc52

      - name: Parse custom ttyd script
        run: |
          node <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('ha-codex-terminal/rootfs/usr/share/ttyd/index.html', 'utf8');
          const start = html.lastIndexOf('<script>');
          const end = html.lastIndexOf('</script>');
          const js = html.slice(start + '<script>'.length, end).trim();
          new Function(js);
          NODE

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Test build
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            --target /data/ha-codex-terminal \
            --amd64 \
            --aarch64 \
            --test \
            -i local/{arch}-ha-codex-terminal \
            -d local
