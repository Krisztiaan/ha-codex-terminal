# Global tmux configuration for HA Codex Terminal
set -g mouse on
set -s escape-time 0
set -s set-clipboard on
setw -g mode-keys vi

# Copy selection to browser clipboard via OSC 52
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "/usr/local/bin/tmux-osc52"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "/usr/local/bin/tmux-osc52"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "/usr/local/bin/tmux-osc52"
# Fallback for emacs copy-mode
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "/usr/local/bin/tmux-osc52"
set -g xterm-keys on
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -g history-limit 200000
set -g prefix C-b
set -g prefix2 C-a
unbind C-a
bind C-a send-prefix
bind -n C-S-Left select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up select-pane -U
bind -n C-S-Down select-pane -D
bind -n WheelUpPane if-shell -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -e; send-keys -M"
bind -n WheelDownPane select-pane -t = \; send-keys -M
